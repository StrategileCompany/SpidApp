# =============================================
# ClusterOS Daily Scan Workflow
# Copy this to .github/workflows/daily-scan.yml in each project
# =============================================
name: Daily Scan

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC (3 AM BRT)
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/security-audit
            p/owasp-top-ten

  dependencies:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm audit --audit-level=high || true

